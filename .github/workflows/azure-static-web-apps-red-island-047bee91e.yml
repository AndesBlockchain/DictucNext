name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

env:
  STRAPI_API_URL: https://backend-dictuc.andesblockchain.com
  NEXT_PUBLIC_STRAPI_API_URL: https://backend-dictuc.andesblockchain.com
  VERIFICACION_URL: https://xnet.dictuc.cl/xnet/dictuc/firma_elect/descarga_doc.phtml
  TICKET_API_TOKEN: hh77ApytA3fWzjQG4FUafsAXPWLMQ8sMqPRK0bunLdnuqobc3ub8AGRAGUfGeA7LPtMwbGbBfjjwkqd7yekLv9gekZu6nCAWcsUr
  NEXT_PUBLIC_ALGOLIA_APP_ID: 6DXBNCDC9X
  NEXT_PUBLIC_ALGOLIA_SEARCH_KEY: 7fd66bc77502ecb22bfd3623b6611ca4
  SENTRY_AUTH_TOKEN: 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
  REVALIDATION_SECRET: UckIDx4UxmETzPxFrDJCwCipILfgicYYYvS535jcEBUDDKb8fyrQpGqIOl2vuCUV
  SITE_URL: https://www.dictuc.cl

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_ISLAND_047BEE91E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_ISLAND_047BEE91E }}
          action: "close"
